name: Full Pipeline CI [DevOps + DevSecOps]

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Roda Unit Tests com H2 (Rápido)
      - name: Unit Tests
        run: mvn test -Dtest="!*IntegrationTest"
        working-directory: ./springboot_app

      # Roda Integration Tests com Testcontainers (Postgres real)
      - name: Integration Tests
        run: mvn verify -Pintegration-test -Dtest="*IntegrationTest"
        working-directory: ./springboot_app


      # STEP 3: Verificação de Qualidade (JaCoCo)
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: springboot_app/target/site/jacoco/

      - name: SonarQube Analysis
        working-directory: ./springboot_app
        run: mvn -B verify sonar:sonar -Psonar -Dsonar.token=$SONAR_TOKEN --no-transfer-progress
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Filesystem Scan (code + dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './springboot_app'
          format: 'table'
          exit-code: '1'           # Fail the build on CRITICAL or HIGH
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'

      - name: Build Docker Image for Scan
        run: docker build -f Dockerfile -t springboot_app:latest .
        working-directory: ./springboot_app

      - name: Trivy Docker Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'springboot_app:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'

      - name: Build JAR
        working-directory: ./springboot_app
        run: mvn -B clean package -DskipTests --no-transfer-progress

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./springboot_app
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/springboot_app:latest
            ${{ vars.DOCKERHUB_USERNAME }}/springboot_app:${{ github.sha }}