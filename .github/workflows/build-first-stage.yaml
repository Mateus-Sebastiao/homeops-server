name: Build & Test

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Maven Build (cache)
    runs-on: ubuntu-24.04
    
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Setup Java plus Maven
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean verify --no-transfer-progress
        working-directory: ./springboot_app

      # Upload report for auditing
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: springboot_app/target/site/jacoco/
          retention-days: 1