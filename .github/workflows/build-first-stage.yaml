name: Build & Test

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Roda Unit Tests com H2 (Rápido)
      - name: Unit Tests
        run: mvn test -Dtest="!*IntegrationTest"
        working-directory: ./springboot_app

      # Roda Integration Tests com Testcontainers (Postgres real)
      - name: Integration Tests
        run: mvn verify -Pintegration-test -Dtest="*IntegrationTest"
        working-directory: ./springboot_app


      # STEP 3: Verificação de Qualidade (JaCoCo)
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: springboot_app/target/site/jacoco/